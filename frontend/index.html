<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      min-height: 100vh;
    }

    #app { max-width: 680px; margin: 0 auto; padding: 0 16px; }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 0 28px;
      transition: padding 0.2s;
    }
    .header.compact { padding: 20px 0 16px; flex-direction: row; gap: 16px; }

    .logo {
      font-size: 36px;
      font-weight: 700;
      color: #1a73e8;
      letter-spacing: -1px;
      margin-bottom: 24px;
      transition: all 0.2s;
    }
    .header.compact .logo { font-size: 22px; margin-bottom: 0; }

    .search-wrap { width: 100%; max-width: 560px; position: relative; }

    .search-bar {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 10px 16px;
      gap: 10px;
      transition: box-shadow 0.15s;
      position: relative;
      z-index: 10;
    }
    .search-bar:focus-within {
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      border-color: transparent;
    }
    .search-icon { color: #9aa0a6; flex-shrink: 0; }
    #search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
      color: #202124;
    }
    #clear-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa0a6;
      padding: 2px;
      font-size: 18px;
      line-height: 1;
    }
    #clear-btn:hover { color: #5f6368; }

    /* ── suggestions dropdown ── */
    #suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #dfe1e5;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 100;
      overflow: hidden;
    }
    .suggestion-item {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      color: #202124;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .suggestion-item:hover, .suggestion-item.active {
      background: #f1f3f4;
    }
    .suggestion-icon { color: #9aa0a6; flex-shrink: 0; }
    .suggestion-item mark {
      background: none;
      font-weight: 600;
      color: #202124;
    }

    .mode-wrap {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: center;
    }
    .header.compact .mode-wrap { margin-top: 0; }
    .mode-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid #dfe1e5;
      background: #fff;
      cursor: pointer;
      color: #5f6368;
      transition: all 0.15s;
    }
    .mode-btn.active {
      background: #e8f0fe;
      border-color: #c5d4f7;
      color: #1a73e8;
      font-weight: 500;
    }

    #results-meta {
      font-size: 13px;
      color: #70757a;
      padding: 8px 0 16px;
      display: none;
    }

    .result {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 10px;
      transition: box-shadow 0.15s;
    }
    .result:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .result-url {
      font-size: 12px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-url .domain { color: #202124; font-weight: 500; }
    .result-url .path   { color: #5f6368; }

    .result-title {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .result-title a { color: #1a0dab; text-decoration: none; }
    .result-title a:hover { text-decoration: underline; }
    .result-title mark, .result-snippet mark {
      background: #fff3cd;
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .result-snippet {
      font-size: 14px;
      color: #4d5156;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .result-meta {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .score-badge {
      font-size: 11px;
      background: #e8f0fe;
      color: #1a73e8;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }
    .token-count { font-size: 11px; color: #9aa0a6; }

    #loading {
      display: none;
      text-align: center;
      padding: 40px 0;
      color: #5f6368;
      font-size: 14px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #e8eaed;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #empty-state {
      display: none;
      text-align: center;
      padding: 60px 0;
      color: #5f6368;
    }
    #empty-state .big { font-size: 40px; margin-bottom: 12px; }
    #empty-state p { font-size: 14px; }

    #error-state {
      display: none;
      background: #fce8e6;
      border: 1px solid #f5c6c2;
      border-radius: 8px;
      padding: 16px;
      color: #c5221f;
      font-size: 14px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
<div id="app">

  <div class="header" id="header">
    <div class="logo">search</div>
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Search..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="clear-btn" title="Clear">&#x2715;</button>
      </div>

      <div id="suggestions"></div>

      <div class="mode-wrap">
        <button class="mode-btn active" data-mode="OR"  onclick="setMode('OR')">OR — any term</button>
        <button class="mode-btn"        data-mode="AND" onclick="setMode('AND')">AND — all terms</button>
      </div>
    </div>
  </div>

  <div id="results-meta"></div>
  <div id="loading"><div class="spinner"></div>Searching...</div>
  <div id="results"></div>
  <div id="empty-state">
    <div class="big">&#128269;</div>
    <p>No results found for your query.</p>
    <p style="margin-top:6px;font-size:12px;">Try different keywords or switch to OR mode.</p>
  </div>
  <div id="error-state"></div>

</div>

<script>
  const API = "http://localhost:8000";
  let currentMode    = "OR";
  let searchTimer    = null;
  let suggestTimer   = null;
  let activeSuggest  = -1;
  let suggestions    = [];

  const input       = document.getElementById("search-input");
  const clearBtn    = document.getElementById("clear-btn");
  const header      = document.getElementById("header");
  const metaEl      = document.getElementById("results-meta");
  const loadingEl   = document.getElementById("loading");
  const resultsEl   = document.getElementById("results");
  const emptyEl     = document.getElementById("empty-state");
  const errorEl     = document.getElementById("error-state");
  const suggestBox  = document.getElementById("suggestions");

  // ── mode toggle ──────────────────────────────────────────
  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.mode === mode);
    });
    if (input.value.trim()) triggerSearch();
  }

  // ── clear ─────────────────────────────────────────────────
  input.addEventListener("input", () => {
    const q = input.value;
    clearBtn.style.display = q ? "block" : "none";
    if (!q) { clearAll(); hideSuggestions(); return; }
    clearTimeout(suggestTimer);
    suggestTimer = setTimeout(() => fetchSuggestions(q), 300);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(triggerSearch, 400);
  });

  clearBtn.addEventListener("click", () => {
    input.value = "";
    clearBtn.style.display = "none";
    clearAll();
    hideSuggestions();
    input.focus();
  });

  // ── keyboard navigation ───────────────────────────────────
  input.addEventListener("keydown", e => {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeSuggest = Math.min(activeSuggest + 1, suggestions.length - 1);
      renderSuggestionHighlight();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeSuggest = Math.max(activeSuggest - 1, -1);
      renderSuggestionHighlight();
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (activeSuggest >= 0 && suggestions[activeSuggest]) {
        selectSuggestion(suggestions[activeSuggest]);
      } else {
        clearTimeout(searchTimer);
        hideSuggestions();
        triggerSearch();
      }
    } else if (e.key === "Escape") {
      hideSuggestions();
    }
  });

  document.addEventListener("click", e => {
    if (!e.target.closest(".search-wrap")) hideSuggestions();
  });

  // ── suggestions ───────────────────────────────────────────
  async function fetchSuggestions(q) {
    if (q.length < 2) { hideSuggestions(); return; }
    try {
      const res  = await fetch(`${API}/suggest?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      suggestions   = data.suggestions || [];
      activeSuggest = -1;
      renderSuggestions(q);
    } catch {
      hideSuggestions();
    }
  }

  function renderSuggestions(query) {
    if (!suggestions.length) { hideSuggestions(); return; }
    suggestBox.innerHTML = suggestions.map((s, i) => `
      <div class="suggestion-item" data-index="${i}" onclick="selectSuggestion('${escHtml(s)}')">
        <svg class="suggestion-icon" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        ${highlightPrefix(s, query)}
      </div>
    `).join("");
    suggestBox.style.display = "block";
  }

  function renderSuggestionHighlight() {
    document.querySelectorAll(".suggestion-item").forEach((el, i) => {
      el.classList.toggle("active", i === activeSuggest);
    });
  }

  function selectSuggestion(term) {
    input.value = term;
    clearBtn.style.display = "block";
    hideSuggestions();
    triggerSearch();
  }

  function hideSuggestions() {
    suggestBox.style.display = "none";
    suggestions   = [];
    activeSuggest = -1;
  }

  function highlightPrefix(term, prefix) {
    const safe   = escHtml(term);
    const safePfx = escHtml(prefix);
    const re = new RegExp(`^(${escRegex(safePfx)})`, "i");
    return safe.replace(re, "<mark>$1</mark>");
  }

  // ── main search ───────────────────────────────────────────
  async function triggerSearch() {
    const q = input.value.trim();
    if (!q) return;

    hideSuggestions();
    setLoading(true);
    header.classList.add("compact");

    try {
      const url  = `${API}/search?q=${encodeURIComponent(q)}&top_k=10&mode=${currentMode}`;
      const res  = await fetch(url);

      if (!res.ok) {
        const err = await res.json();
        showError(`API error ${res.status}: ${err.detail || "Unknown error"}`);
        return;
      }

      const data = await res.json();
      renderResults(data);

    } catch {
      showError("Could not reach the search server. Is it running?");
    } finally {
      setLoading(false);
    }
  }

  // ── render results ────────────────────────────────────────
  function renderResults(data) {
    hideAll();

    metaEl.style.display = "block";
    metaEl.textContent =
      `About ${data.total_hits.toLocaleString()} result${data.total_hits !== 1 ? "s" : ""} ` +
      `(${data.elapsed_ms}ms)` +
      (data.missing.length ? `  —  terms not found: ${data.missing.join(", ")}` : "");

    if (!data.results.length) { emptyEl.style.display = "block"; return; }

    const tokens = data.tokens;
    resultsEl.innerHTML = data.results.map(r => buildCard(r, tokens)).join("");
  }

  function buildCard(result, tokens) {
    const parsed  = tryParseURL(result.url);
    const domain  = parsed ? parsed.hostname : result.url;
    const path    = parsed ? parsed.pathname : "";
    const title   = highlight(result.title,   tokens);
    const snippet = highlight(result.snippet || "", tokens);

    return `
      <div class="result">
        <div class="result-url">
          <span class="domain">${escHtml(domain)}</span>
          <span class="path">${escHtml(path)}</span>
        </div>
        <div class="result-title">
          <a href="${escHtml(result.url)}" target="_blank" rel="noopener">${title}</a>
        </div>
        ${snippet ? `<div class="result-snippet">${snippet}</div>` : ""}
        <div class="result-meta">
          <span class="score-badge">score ${result.score.toFixed(3)}</span>
          <span class="token-count">${result.token_count.toLocaleString()} tokens</span>
        </div>
      </div>
    `;
  }

  // ── helpers ───────────────────────────────────────────────
  function highlight(text, terms) {
    if (!terms || !terms.length) return escHtml(text);
    let safe = escHtml(text);
    terms.forEach(term => {
      const re = new RegExp(`(${escRegex(term)})`, "gi");
      safe = safe.replace(re, "<mark>$1</mark>");
    });
    return safe;
  }

  function setLoading(on) {
    loadingEl.style.display = on ? "block" : "none";
    if (on) hideAll();
  }

  function clearAll() {
    hideAll();
    header.classList.remove("compact");
    metaEl.style.display = "none";
  }

  function hideAll() {
    resultsEl.innerHTML    = "";
    emptyEl.style.display  = "none";
    errorEl.style.display  = "none";
    metaEl.style.display   = "none";
  }

  function showError(msg) {
    errorEl.textContent    = msg;
    errorEl.style.display  = "block";
  }

  function tryParseURL(url) {
    try { return new URL(url); } catch { return null; }
  }

  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;",
      '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function escRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }
</script>
</body>
</html>
